<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020000">
  <title>Contact | Zoe Lane Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="art-styles.css">
</head>
<body>
  <nav class="page-nav">
    <a class="nav-brand" href="https://layerdstamp.github.io/zsite-main/">Zoe Lane</a>
    <div class="nav-links">
      <a href="https://layerdstamp.github.io/zsite-main/">Home</a>
      <a href="portfolio/">Gallery</a>
      <a href="about.html">About</a>
      <a href="cv.html">CV</a>
      <a class="active" href="contact.html">Contact</a>
    </div>
  </nav>

  <main class="main">
    <section class="contact-section">
      <h1>Send Me a Message</h1>

      <form class="contact-form" id="contactForm">
        <div class="form-group">
          <label class="required" for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label class="required" for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" required placeholder="(000) 000-0000">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Write your message here…"></textarea>
        </div>
        <button class="form-submit" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const message = document.getElementById('message').value;
      const body = `From: ${email}%0APhone: ${phone}%0A%0A${encodeURIComponent(message)}`;
      window.location.href = `mailto:zoe.laneeee@gmail.com?subject=Message from ${encodeURIComponent(email)}&body=${body}`;
    });
  </script>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span class="footer-name">Zoe Lane</span>
      <span>&copy;2026 by zoelaneart.</span>
    </div>
  </footer>
</body>
</html>
