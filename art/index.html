<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Zoe Lane — Art &amp; Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }
    body { font-family:'Playfair Display', Georgia, serif; color:#fff; touch-action:none; -webkit-tap-highlight-color:transparent; overscroll-behavior:none; }

    /* ── GALAXY INTRO ──────────────────────────── */
    #galaxy-canvas { position:fixed; inset:0; z-index:10; }
    #intro-overlay {
      position:fixed; inset:0; z-index:11;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      pointer-events:none;
    }
    #intro-title {
      font-size:2.2rem; letter-spacing:.35em; text-transform:uppercase;
      color:#fff; opacity:0; transition:opacity 1.5s;
    }
    #intro-sub {
      font-size:.85rem; letter-spacing:.25em; font-style:italic;
      color:rgba(255,255,255,.5); opacity:0; transition:opacity 1.5s; margin-top:8px;
    }
    .intro-fadeout { transition:opacity .6s !important; opacity:0 !important; }
    #skip-btn {
      position:fixed; bottom:28px; right:28px; z-index:12;
      background:none; border:1px solid rgba(255,255,255,.2);
      color:rgba(255,255,255,.4); padding:7px 18px;
      font-size:.6rem; letter-spacing:.18em; cursor:pointer;
      font-family:inherit; transition:all .3s;
    }
    #skip-btn:hover { border-color:#fff; color:#fff; }

    /* ── GALLERY CANVAS ────────────────────────── */
    #gallery-canvas {
      position:fixed; inset:0; z-index:1;
      display:none;
    }

    /* ── CHARACTER SVG ─────────────────────────── */
    #character {
      position:fixed; bottom:8%; left:50%; transform:translateX(-50%);
      z-index:2; pointer-events:none; display:none; opacity:.7;
    }
    #character.dropping {
      animation: charDrop .6s cubic-bezier(.22,.68,.36,1.18) forwards;
    }
    @keyframes charDrop {
      0%   { bottom:110%; opacity:0; }
      15%  { opacity:.7; }
      75%  { bottom:6%; }
      85%  { bottom:10%; }
      100% { bottom:8%; }
    }
    #character .leg-l { transform-origin:17px 48px; }
    #character .leg-r { transform-origin:23px 48px; }
    #character.walking { animation:charBob .45s ease-in-out infinite; }
    #character.walking .leg-l { animation:legL .45s ease-in-out infinite; }
    #character.walking .leg-r { animation:legR .45s ease-in-out infinite; }
    @keyframes charBob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-2px)} }
    @keyframes legL { 0%,100%{transform:rotate(-7deg)} 50%{transform:rotate(7deg)} }
    @keyframes legR { 0%,100%{transform:rotate(7deg)} 50%{transform:rotate(-7deg)} }

    /* ── WALK HINT ─────────────────────────────── */
    #walk-hint {
      position:fixed; bottom:3%; left:50%; transform:translateX(-50%);
      z-index:5; color:rgba(255,255,255,.25);
      font-size:.55rem; letter-spacing:.15em; text-transform:uppercase;
      display:none; text-align:center;
      animation:hintPulse 2.5s infinite;
    }
    @keyframes hintPulse { 0%,100%{opacity:.2} 50%{opacity:.6} }

    /* ── SCROLL PROMPT (first 2 paintings) ────── */
    #scroll-prompt {
      position:fixed; bottom:12%; left:50%; transform:translateX(-50%);
      z-index:10; display:none; flex-direction:column; align-items:center;
      pointer-events:none;
    }
    #scroll-prompt .prompt-text {
      font-size:.7rem; letter-spacing:.2em; text-transform:uppercase;
      color:rgba(255,255,255,.55); margin-bottom:8px;
    }
    #scroll-prompt .prompt-arrow {
      width:22px; height:22px; border-left:1.5px solid rgba(255,255,255,.45);
      border-bottom:1.5px solid rgba(255,255,255,.45);
      transform:rotate(-45deg);
      animation:promptBounce 1.4s ease-in-out infinite;
    }
    @keyframes promptBounce {
      0%,100%{ transform:rotate(-45deg) translateY(0); opacity:.3; }
      50%{ transform:rotate(-45deg) translateY(6px); opacity:.7; }
    }
    #scroll-prompt.fade-out {
      transition:opacity .6s; opacity:0;
    }

    /* ── PHOTO OVERLAY ─────────────────────────── */
    #photo-overlay {
      position:fixed; bottom:40px; left:0; right:0; z-index:20;
      display:none; align-items:center; justify-content:center;
      flex-direction:column; pointer-events:none;
    }
    #photo-overlay .photo-title {
      font-size:.85rem; letter-spacing:.22em;
      color:rgba(255,255,255,.7); font-style:italic;
      text-shadow:0 2px 8px rgba(0,0,0,.8);
    }
    #photo-overlay .photo-year {
      margin-top:4px; font-size:.65rem; letter-spacing:.18em;
      color:rgba(255,255,255,.4);
      text-shadow:0 2px 8px rgba(0,0,0,.8);
    }

    /* ── HAMBURGER MENU ────────────────────────── */
    .hamburger {
      position:fixed; top:18px; left:18px; z-index:30;
      width:28px; height:22px; cursor:pointer;
      display:flex; flex-direction:column; justify-content:space-between;
      background:none; border:none; padding:0;
    }
    .hamburger span {
      display:block; width:100%; height:1.5px;
      background:rgba(255,255,255,.5); transition:all .3s;
    }
    .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(6px,6px)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(7px,-7px)}

    .nav-menu {
      position:fixed; top:0; left:-260px; z-index:29;
      width:260px; height:100%;
      background:rgba(0,0,0,.96);
      border-right:1px solid rgba(255,255,255,.06);
      transition:left .3s ease;
      display:flex; flex-direction:column;
      padding:72px 28px 28px;
    }
    .nav-menu.open { left:0; }
    .nav-menu a {
      color:rgba(255,255,255,.45); text-decoration:none;
      font-size:.72rem; letter-spacing:.2em; text-transform:uppercase;
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,.04);
      transition:color .3s, letter-spacing .3s;
    }
    .nav-menu a:hover { color:#fff; letter-spacing:.28em; }

    /* ── ZOOM TRANSITION FLASH ─────────────────── */
    #zoom-flash {
      position:fixed; inset:0; z-index:50;
      background:#fff; opacity:0; pointer-events:none;
      display:none;
    }

    /* ── 2D GALLERY ────────────────────────────── */
    #flat-gallery {
      display:none; background:#0a0a0a; min-height:100vh;
      padding:80px 20px 60px;
    }
    #flat-gallery.visible {
      display:block;
    }
    .fg-header {
      text-align:center; margin-bottom:60px;
    }
    .fg-header h1 {
      font-size:1.6rem; letter-spacing:.4em; text-transform:uppercase;
      font-weight:400; color:rgba(255,255,255,.85);
    }
    .fg-header p {
      margin-top:10px; font-size:.7rem; letter-spacing:.2em;
      color:rgba(255,255,255,.3); font-style:italic;
    }
    .fg-grid {
      max-width:1000px; margin:0 auto;
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
      gap:28px;
    }
    .fg-card {
      background:#141414; border-radius:6px;
      overflow:hidden;
      box-shadow:0 8px 32px rgba(0,0,0,.6), 0 2px 8px rgba(0,0,0,.4);
      transition:transform .35s ease, box-shadow .35s ease;
    }
    .fg-card:active { transform:scale(.97); }
    @media(hover:hover){
      .fg-card:hover {
        transform:translateY(-6px);
        box-shadow:0 16px 48px rgba(0,0,0,.8), 0 4px 16px rgba(0,0,0,.5);
      }
    }
    .fg-card img {
      width:100%; display:block;
      aspect-ratio:4/5; object-fit:cover;
    }
    .fg-card-info {
      padding:18px 20px 22px;
    }
    .fg-card-info h3 {
      font-size:.8rem; letter-spacing:.18em; font-weight:400;
      color:rgba(255,255,255,.75); font-style:italic;
    }
    .fg-card-info span {
      display:block; margin-top:6px;
      font-size:.6rem; letter-spacing:.15em;
      color:rgba(255,255,255,.3);
    }
    .fg-footer {
      text-align:center; margin-top:60px; padding:40px 0;
      border-top:1px solid rgba(255,255,255,.06);
    }
    .fg-footer a {
      font-size:.65rem; letter-spacing:.2em; text-transform:uppercase;
      color:rgba(255,255,255,.35); text-decoration:none;
      transition:color .3s;
    }
    .fg-footer a:hover { color:rgba(255,255,255,.7); }

    @media (max-width:600px){
      .fg-grid { grid-template-columns:1fr; gap:24px; }
      #flat-gallery { padding:60px 16px 40px; }
      .fg-header h1 { font-size:1.2rem; }
    }
  </style>
</head>
<body>

  <!-- Hamburger Menu -->
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-menu" id="navMenu">
    <a href="../index.html">Home</a>
    <a href="portfolio/">Gallery</a>
    <a href="about.html">About</a>
    <a href="cv.html">CV</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- Galaxy Intro -->
  <canvas id="galaxy-canvas"></canvas>
  <div id="intro-overlay">
    <div id="intro-title">Zoe Lane</div>
    <div id="intro-sub">Art &amp; Design</div>
  </div>
  <button id="skip-btn">SKIP</button>

  <!-- Gallery -->
  <canvas id="gallery-canvas"></canvas>

  <!-- Character (Bratz-style silhouette from behind) -->
  <svg id="character" viewBox="0 0 40 120" width="75" height="225" xmlns="http://www.w3.org/2000/svg">
    <!-- Big head -->
    <ellipse cx="20" cy="9" rx="7.5" ry="9" fill="none" stroke="rgba(255,255,255,.65)" stroke-width=".8"/>
    <!-- Voluminous hair flowing down -->
    <path d="M12.5 5Q8 12 9 30" fill="none" stroke="rgba(255,255,255,.4)" stroke-width=".7"/>
    <path d="M27.5 5Q32 12 31 30" fill="none" stroke="rgba(255,255,255,.4)" stroke-width=".7"/>
    <path d="M14 3Q10 14 10.5 28" fill="none" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
    <path d="M26 3Q30 14 29.5 28" fill="none" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
    <path d="M15 2Q12 10 11.5 26" fill="none" stroke="rgba(255,255,255,.25)" stroke-width=".5"/>
    <path d="M25 2Q28 10 28.5 26" fill="none" stroke="rgba(255,255,255,.25)" stroke-width=".5"/>
    <!-- Thin neck -->
    <line x1="20" y1="18" x2="20" y2="23" stroke="rgba(255,255,255,.6)" stroke-width=".8"/>
    <!-- Slim torso — tiny cinched waist, wider shoulders & hips -->

    <!-- Waist to hips -->
    <path d="M17 33Q16 38 14.5 48" fill="none" stroke="rgba(255,255,255,.6)" stroke-width=".8"/>
    <path d="M23 33Q24 38 25.5 48" fill="none" stroke="rgba(255,255,255,.6)" stroke-width=".8"/>
    <!-- Skirt/hip flare -->
    <path d="M14.5 48Q20 50 25.5 48" fill="none" stroke="rgba(255,255,255,.5)" stroke-width=".7"/>
    <!-- Long skinny legs -->
    <g class="leg-l">
      <path d="M17 48Q16.5 65 16 82Q15.5 90 15 100" fill="none" stroke="rgba(255,255,255,.6)" stroke-width=".8"/>
      <!-- Platform boot -->
      <path d="M15 100Q14 102 11 104L11 106Q12 107 17 107Q18 106 17 104Q16 102 15 100" fill="none" stroke="rgba(255,255,255,.55)" stroke-width=".7"/>
    </g>
    <g class="leg-r">
      <path d="M23 48Q23.5 65 24 82Q24.5 90 25 100" fill="none" stroke="rgba(255,255,255,.6)" stroke-width=".8"/>
      <!-- Platform boot -->
      <path d="M25 100Q26 102 29 104L29 106Q28 107 23 107Q22 106 23 104Q24 102 25 100" fill="none" stroke="rgba(255,255,255,.55)" stroke-width=".7"/>
    </g>
  </svg>

  <div id="walk-hint">scroll or tap to continue</div>

  <!-- Scroll prompt for first paintings -->
  <div id="scroll-prompt">
    <div class="prompt-text">scroll</div>
    <div class="prompt-arrow"></div>
  </div>

  <!-- Photo Overlay (title/year shown in-scene) -->
  <div id="photo-overlay">
    <div class="photo-title" id="photoTitle"></div>
    <div class="photo-year" id="photoYear"></div>
  </div>

  <!-- Zoom transition flash -->
  <div id="zoom-flash"></div>

  <!-- 2D Flat Gallery -->
  <div id="flat-gallery">
    <div class="fg-header">
      <h1>Portfolio</h1>
      <p>Selected works &middot; 2021 &ndash; 2024</p>
    </div>
    <div class="fg-grid" id="fg-grid"></div>
    <div class="fg-footer">
      <a href="../index.html">Back to Home</a>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function(){
  'use strict';

  /* ═══════════════════════════════════════════════
     CONFIGURATION
     ═══════════════════════════════════════════════ */
  var PC = 50000;          // particle count
  var INTRO_MS = 8000;     // intro duration ms
  var FIELD_LEN = 3000;    // depth of particle field
  var FIELD_RAD = 100;     // radius around camera path

  var HW = 8;              // hallway width
  var HH = 5;              // hallway height
  var FY = 2.4;            // frame center Y
  var FS = 6;              // frame spacing along Z
  var WALK_SPD = 0.12;

  var artworks = [
    {s:'../assets/images/art/self-portrait.jpeg',    t:'Self Portrait',       y:'2021'},
    {s:'../assets/images/art/fatherly-love.jpg',     t:'Fatherly Love',       y:'2021'},
    {s:'../assets/images/art/dead-mother.jpg',       t:'Dead Mother',         y:'2021'},
    {s:'../assets/images/art/femme-fatale-skirt.jpeg',t:'Femme Fatale Skirt', y:'2022'},
    {s:'../assets/images/art/teapot-set.jpeg',       t:'Teapot Set',          y:'2023'},
    {s:'../assets/images/art/wild-cherry.jpg',       t:'Wild Cherry',         y:'2023'},
    {s:'../assets/images/art/sun-trails-1.jpeg',     t:'Sun Trails Series',   y:'2023'},
    {s:'../assets/images/art/butterfly-locket-1.jpeg',t:'Butterfly Locket',   y:'2024'},
    {s:'../assets/images/art/fidget-ring.jpeg',      t:'Fidget Ring',         y:'2024'},
    {s:'../assets/images/art/fashion-standards-1.jpeg',t:'Fashion Standards', y:'2024'}
  ];

  /* ═══════════════════════════════════════════════
     STATE
     ═══════════════════════════════════════════════ */
  var phase = 'intro';
  var introEnding = false;
  var introStart = performance.now();
  var camZ = 2;
  var camZMin = 2;
  var camZMax;
  var clickables = [];

  // Guided tour navigation
  var frameStops = [];    // Z positions for each painting
  var frameSides = [];    // 'left' or 'right' per frame
  var frameData = [];     // userData per frame
  var currentStop = -1;   // which painting we're at (-1 = entrance)
  var isMoving = false;   // walking to next stop

  // States: 'idle' (entrance) | 'walking' | 'arriving' (turning to face) | 'viewing' (looking at painting)
  var viewState = 'idle';
  var lookTarget = null;
  var lookLerp = 0;
  var lastActionTime = 0; // for idle hint timer
  var idleHintShown = false;

  // Mouse-based head look (subtle parallax)
  var mouseX = 0, mouseY = 0; // normalized -1 to 1

  /* ═══════════════════════════════════════════════
     DOM REFS
     ═══════════════════════════════════════════════ */
  var $gc = document.getElementById('galaxy-canvas');
  var $gal = document.getElementById('gallery-canvas');
  var $intro = document.getElementById('intro-overlay');
  var $title = document.getElementById('intro-title');
  var $sub = document.getElementById('intro-sub');
  var $skip = document.getElementById('skip-btn');
  var $char = document.getElementById('character');
  var $hint = document.getElementById('walk-hint');
  var $overlay = document.getElementById('photo-overlay');
  var $pTitle = document.getElementById('photoTitle');
  var $pYear = document.getElementById('photoYear');
  var $ham = document.getElementById('hamburger');
  var $nav = document.getElementById('navMenu');
  var $scrollPrompt = document.getElementById('scroll-prompt');
  var $zoomFlash = document.getElementById('zoom-flash');
  var $flatGallery = document.getElementById('flat-gallery');
  var $fgGrid = document.getElementById('fg-grid');

  /* ═══════════════════════════════════════════════
     GALAXY SCENE
     ═══════════════════════════════════════════════ */
  var gR = new THREE.WebGLRenderer({canvas:$gc, antialias:false, alpha:false});
  gR.setSize(innerWidth, innerHeight);
  gR.setPixelRatio(Math.min(devicePixelRatio, 2));

  var gScene = new THREE.Scene();
  var gCam = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
  gCam.position.set(0, 0, 0);
  gCam.lookAt(0, 0, -1);

  /* ── SEEDED RANDOM ── */
  var _seed = 42;
  function srand(){ _seed=((_seed*16807)%2147483647); return(_seed-1)/2147483646; }

  /* ── PARTICLE FIELD ── */
  var pos = new Float32Array(PC * 3);
  var col = new Float32Array(PC * 3);
  var szs = new Float32Array(PC);

  for(var i = 0; i < PC; i++){
    pos[i*3]   = (srand() - 0.5) * FIELD_RAD * 2;
    pos[i*3+1] = (srand() - 0.5) * FIELD_RAD * 2;
    pos[i*3+2] = -srand() * FIELD_LEN;

    var bright = 0.3 + srand() * 0.7;
    var cType = srand();
    if(cType < 0.5){
      col[i*3]=0.7*bright; col[i*3+1]=0.75*bright; col[i*3+2]=0.95*bright;
    } else if(cType < 0.8){
      col[i*3]=0.85*bright; col[i*3+1]=0.85*bright; col[i*3+2]=0.85*bright;
    } else {
      col[i*3]=0.9*bright; col[i*3+1]=0.7*bright; col[i*3+2]=0.5*bright;
    }
    szs[i] = 0.3 + srand() * 0.8;
    if(srand() > 0.98) szs[i] = 1.5 + srand() * 1.0;
  }

  var gGeo = new THREE.BufferGeometry();
  gGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  gGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  gGeo.setAttribute('size', new THREE.BufferAttribute(szs, 1));

  var gMat = new THREE.ShaderMaterial({
    uniforms: { uSpeed:{value:0} },
    vertexShader: [
      'attribute float size;',
      'varying vec3 vColor;',
      'uniform float uSpeed;',
      'void main(){',
      '  vColor = color;',
      '  vec4 mv = modelViewMatrix * vec4(position, 1.0);',
      '  float streak = 1.0 + uSpeed * 3.0;',
      '  gl_PointSize = max(size * streak * (200.0 / max(-mv.z, 1.0)), 0.5);',
      '  gl_Position = projectionMatrix * mv;',
      '}'
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vColor;',
      'uniform float uSpeed;',
      'void main(){',
      '  vec2 c = gl_PointCoord - vec2(0.5);',
      '  float d = length(c);',
      '  if(d > 0.5) discard;',
      '  float soft = 1.0 - smoothstep(0.0, 0.5, d);',
      '  float streakFade = 1.0 - smoothstep(0.0, 0.25 + uSpeed*0.25, abs(c.y));',
      '  float a = mix(soft, soft * streakFade, min(uSpeed, 1.0));',
      '  gl_FragColor = vec4(vColor, a * 0.8);',
      '}'
    ].join('\n'),
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  var gMesh = new THREE.Points(gGeo, gMat);
  gScene.add(gMesh);

  /* ═══════════════════════════════════════════════
     GALLERY SCENE
     ═══════════════════════════════════════════════ */
  var rend = new THREE.WebGLRenderer({canvas:$gal, antialias:true});
  rend.setSize(innerWidth, innerHeight);
  rend.setPixelRatio(Math.min(devicePixelRatio, 2));
  rend.shadowMap.enabled = true;
  rend.shadowMap.type = THREE.PCFSoftShadowMap;

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);
  scene.fog = new THREE.Fog(0x1a1a1a, 12, 45);

  // Procedural environment map for reflections
  var envSize = 128;
  var envCvs = document.createElement('canvas');
  envCvs.width = envSize; envCvs.height = envSize;
  var eCtx = envCvs.getContext('2d');
  var envGrad = eCtx.createLinearGradient(0, 0, 0, envSize);
  envGrad.addColorStop(0, '#ffffff');
  envGrad.addColorStop(0.3, '#aaaaaa');
  envGrad.addColorStop(0.5, '#555555');
  envGrad.addColorStop(0.7, '#333333');
  envGrad.addColorStop(1, '#1a1a1a');
  eCtx.fillStyle = envGrad;
  eCtx.fillRect(0, 0, envSize, envSize);
  // Add bright spots to simulate ceiling lights
  eCtx.fillStyle = 'rgba(255,255,255,0.6)';
  for(var ei = 0; ei < 8; ei++){
    eCtx.beginPath();
    eCtx.arc(20 + ei * 60 % envSize, 15 + (ei%3)*10, 8, 0, Math.PI*2);
    eCtx.fill();
  }
  var envTex = new THREE.CanvasTexture(envCvs);
  envTex.mapping = THREE.EquirectangularReflectionMapping;
  scene.environment = envTex;

  var cam = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 80);
  cam.position.set(0, 1.6, camZ);
  cam.lookAt(0, 1.6, -20);

  // Ambient — soft fill so nothing is pure black
  scene.add(new THREE.AmbientLight(0xffffff, 0.35));

  // Overhead directional for general shading
  var dirLight = new THREE.DirectionalLight(0xffffff, 0.45);
  dirLight.position.set(0, HH - 0.2, 0);
  dirLight.target.position.set(0, 0, -10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  scene.add(dirLight);
  scene.add(dirLight.target);

  // Hallway geometry
  var halfW = HW/2;
  var hallLen = artworks.length * FS/2 + 20;
  camZMax = -(hallLen - 6);

  // Floor — glossy reflective white epoxy
  var cubeRT = new THREE.WebGLCubeRenderTarget(256, {format:THREE.RGBFormat, generateMipmaps:true, minFilter:THREE.LinearMipmapLinearFilter});
  var cubeCam = new THREE.CubeCamera(0.1, 50, cubeRT);
  cubeCam.position.set(0, 0.05, -hallLen/4);
  scene.add(cubeCam);

  var floorG = new THREE.PlaneGeometry(HW, hallLen);
  var floorM = new THREE.MeshStandardMaterial({color:0x0a0a0a, roughness:0.08, metalness:0.4, envMap:cubeRT.texture, envMapIntensity:0.8});
  var floor = new THREE.Mesh(floorG, floorM);
  var floorNeedsEnv = true;
  floor.rotation.x = -Math.PI/2;
  floor.position.set(0, 0, -hallLen/2+2);
  floor.receiveShadow = true;
  scene.add(floor);

  // Ceiling — slightly darker grey
  var ceilG = new THREE.PlaneGeometry(HW, hallLen);
  var ceilM = new THREE.MeshStandardMaterial({color:0x3a3a3a, roughness:0.95});
  var ceil = new THREE.Mesh(ceilG, ceilM);
  ceil.rotation.x = Math.PI/2;
  ceil.position.set(0, HH, -hallLen/2+2);
  scene.add(ceil);

  // Hexagon ceiling lights — honeycomb pattern
  var hexR = 0.35;
  var hexShape = new THREE.Shape();
  for(var hi = 0; hi < 6; hi++){
    var ang = Math.PI/6 + hi * Math.PI/3;
    var hx = hexR * Math.cos(ang), hy = hexR * Math.sin(ang);
    if(hi===0) hexShape.moveTo(hx, hy); else hexShape.lineTo(hx, hy);
  }
  hexShape.closePath();
  // Inner cutout for recessed look
  var hexInner = new THREE.Path();
  var innerR = hexR * 0.75;
  for(var hi2 = 0; hi2 < 6; hi2++){
    var ang2 = Math.PI/6 + hi2 * Math.PI/3;
    var ix = innerR * Math.cos(ang2), iy = innerR * Math.sin(ang2);
    if(hi2===0) hexInner.moveTo(ix, iy); else hexInner.lineTo(ix, iy);
  }
  hexInner.closePath();

  var hexBezelG = new THREE.ShapeGeometry(hexShape);
  var hexGlowG = new THREE.ShapeGeometry(new THREE.Shape(hexInner.getPoints()));
  var hexBezelM = new THREE.MeshStandardMaterial({color:0x2a2a2a, roughness:0.4, metalness:0.6});
  var hexGlowM = new THREE.MeshStandardMaterial({color:0xffffff, emissive:0xffffff, emissiveIntensity:0.5, roughness:1});

  var hexSpacingX = hexR * 1.82;
  var hexSpacingZ = hexR * 2.1;
  var hexCols = Math.floor(HW / hexSpacingX) - 1;
  var hexRows = Math.floor(hallLen / hexSpacingZ);
  var hexStartX = -(hexCols - 1) * hexSpacingX / 2;

  for(var hr = 0; hr < hexRows; hr++){
    var rowOffset = (hr % 2 === 0) ? 0 : hexSpacingX / 2;
    for(var hc = 0; hc < hexCols; hc++){
      var hpx = hexStartX + hc * hexSpacingX + rowOffset;
      var hpz = 2 - hr * hexSpacingZ;
      if(Math.abs(hpx) > halfW - 0.5) continue;

      var bezel = new THREE.Mesh(hexBezelG, hexBezelM);
      bezel.rotation.x = Math.PI/2;
      bezel.position.set(hpx, HH - 0.01, hpz);
      scene.add(bezel);

      var glow = new THREE.Mesh(hexGlowG, hexGlowM);
      glow.rotation.x = Math.PI/2;
      glow.position.set(hpx, HH - 0.015, hpz);
      scene.add(glow);
    }
  }

  // Point lights every few hexagons for even illumination
  for(var li = 0; li < hallLen; li += 3){
    var cLight = new THREE.PointLight(0xffffff, 0.18, 9, 2);
    cLight.position.set(0, HH - 0.3, 2 - li);
    scene.add(cLight);
  }

  // Walls — medium grey
  var wallG = new THREE.PlaneGeometry(hallLen, HH);
  var wallM = new THREE.MeshStandardMaterial({color:0x4a4a4a, roughness:0.85});
  var lWall = new THREE.Mesh(wallG, wallM);
  lWall.rotation.y = Math.PI/2;
  lWall.position.set(-halfW, HH/2, -hallLen/2+2);
  scene.add(lWall);

  var rWall = new THREE.Mesh(wallG.clone(), wallM);
  rWall.rotation.y = -Math.PI/2;
  rWall.position.set(halfW, HH/2, -hallLen/2+2);
  scene.add(rWall);

  // Baseboard trim — thin dark strip along bottom of walls
  var bbG = new THREE.PlaneGeometry(hallLen, 0.15);
  var bbM = new THREE.MeshStandardMaterial({color:0x2a2a2a, roughness:0.6, metalness:0.2});
  var bbL = new THREE.Mesh(bbG, bbM);
  bbL.rotation.y = Math.PI/2;
  bbL.position.set(-halfW + 0.005, 0.075, -hallLen/2+2);
  scene.add(bbL);
  var bbR = new THREE.Mesh(bbG.clone(), bbM);
  bbR.rotation.y = -Math.PI/2;
  bbR.position.set(halfW - 0.005, 0.075, -hallLen/2+2);
  scene.add(bbR);

  // End wall
  var ewG = new THREE.PlaneGeometry(HW, HH);
  var ewM = new THREE.MeshStandardMaterial({color:0x3a3a3a, roughness:0.9});
  var endW = new THREE.Mesh(ewG, ewM);
  endW.position.set(0, HH/2, -hallLen+2);
  scene.add(endW);

  // Entrance wall
  var entW = new THREE.Mesh(ewG.clone(), ewM);
  entW.rotation.y = Math.PI;
  entW.position.set(0, HH/2, 4);
  scene.add(entW);

  // Frames + spotlights
  var tl = new THREE.TextureLoader();

  function makeFrame(aw, x, y, z, rotY) {
    var grp = new THREE.Group();
    var aW=1.8, aH=1.4, bW=0.12, fD=0.1;
    var fMat = new THREE.MeshStandardMaterial({color:0x1a1a1a, roughness:0.35, metalness:0.5});

    // Border pieces
    var tG=new THREE.BoxGeometry(aW+bW*2, bW, fD);
    var top=new THREE.Mesh(tG, fMat); top.position.y=aH/2+bW/2; grp.add(top);
    var bot=new THREE.Mesh(tG.clone(), fMat); bot.position.y=-aH/2-bW/2; grp.add(bot);
    var sG=new THREE.BoxGeometry(bW, aH, fD);
    var lt=new THREE.Mesh(sG, fMat); lt.position.x=-aW/2-bW/2; grp.add(lt);
    var rt=new THREE.Mesh(sG.clone(), fMat); rt.position.x=aW/2+bW/2; grp.add(rt);

    // Inner border
    var ibMat=new THREE.MeshStandardMaterial({color:0x444444, roughness:0.5, metalness:0.3});
    var ibW=0.05;
    var itG=new THREE.BoxGeometry(aW+ibW, ibW, fD+0.01);
    var iTop=new THREE.Mesh(itG, ibMat); iTop.position.y=aH/2-ibW/2; iTop.position.z=0.01; grp.add(iTop);
    var iBot=new THREE.Mesh(itG.clone(), ibMat); iBot.position.y=-aH/2+ibW/2; iBot.position.z=0.01; grp.add(iBot);
    var isG=new THREE.BoxGeometry(ibW, aH-ibW*2, fD+0.01);
    var iLt=new THREE.Mesh(isG, ibMat); iLt.position.x=-aW/2+ibW/2; iLt.position.z=0.01; grp.add(iLt);
    var iRt=new THREE.Mesh(isG.clone(), ibMat); iRt.position.x=aW/2-ibW/2; iRt.position.z=0.01; grp.add(iRt);

    // White matte
    var matG=new THREE.PlaneGeometry(aW-0.04, aH-0.04);
    var matM=new THREE.MeshStandardMaterial({color:0xd8d8d8, roughness:0.95});
    var matte=new THREE.Mesh(matG, matM);
    matte.position.z=fD/2-0.02; grp.add(matte);

    // Artwork
    var tex=tl.load(aw.s);
    var artG=new THREE.PlaneGeometry(aW-0.2, aH-0.2);
    var artM=new THREE.MeshBasicMaterial({map:tex});
    var artMesh=new THREE.Mesh(artG, artM);
    artMesh.position.z=fD/2-0.01;
    artMesh.userData={title:aw.t, year:aw.y, src:aw.s, fz:z};
    grp.add(artMesh);

    grp.position.set(x,y,z);
    grp.rotation.y=rotY;
    return {group:grp, art:artMesh};
  }

  for(var f=0;f<artworks.length;f++){
    var side = f%2===0 ? 'left' : 'right';
    var zP = -(f*FS/2 + 8);
    var xP, rY;
    if(side==='left'){ xP=-halfW+0.06; rY=Math.PI/2; }
    else { xP=halfW-0.06; rY=-Math.PI/2; }

    var fr = makeFrame(artworks[f], xP, FY, zP, rY);
    scene.add(fr.group);
    clickables.push(fr.art);

    // Store stop info — stop right at the painting
    frameStops.push(zP);
    frameSides.push(side);
    frameData.push(fr.art.userData);

    // Wall-mounted spotlight per frame
    var sX = side==='left'? xP+1.8 : xP-1.8;
    var sp = new THREE.SpotLight(0xffffff, 1.0, 12, Math.PI/5, 0.5, 1);
    sp.position.set(sX, HH-0.2, zP);
    sp.target.position.set(xP, FY, zP);
    scene.add(sp);
    scene.add(sp.target);

    // Ceiling-mounted spotlight shining straight down onto artwork
    var ceilSp = new THREE.SpotLight(0xffeedd, 0.7, 14, Math.PI/6, 0.6, 1);
    var cSpX = side==='left' ? xP + 1.2 : xP - 1.2;
    ceilSp.position.set(cSpX, HH - 0.05, zP);
    ceilSp.target.position.set(xP, FY, zP);
    scene.add(ceilSp);
    scene.add(ceilSp.target);
  }

  // Point light that follows camera
  var camLight = new THREE.PointLight(0xffffff, 0.35, 12);
  scene.add(camLight);

  /* ═══════════════════════════════════════════════
     BUILD 2D FLAT GALLERY CARDS
     ═══════════════════════════════════════════════ */
  for(var ci = 0; ci < artworks.length; ci++){
    var card = document.createElement('div');
    card.className = 'fg-card';
    card.innerHTML = '<img src="' + artworks[ci].s + '" alt="' + artworks[ci].t + '" loading="lazy">' +
      '<div class="fg-card-info"><h3>' + artworks[ci].t + '</h3><span>' + artworks[ci].y + '</span></div>';
    $fgGrid.appendChild(card);
  }

  /* ═══════════════════════════════════════════════
     TRANSITION TO FLAT GALLERY
     ═══════════════════════════════════════════════ */
  var zoomRushActive = false;
  var zoomRushStart = 0;
  var ZOOM_RUSH_MS = 1800; // duration of the camera rush

  function startZoomTransition(){
    zoomRushActive = true;
    zoomRushStart = performance.now();
    viewState = 'zoom-rush';
    // Hide UI
    $overlay.style.display = 'none';
    $scrollPrompt.style.display = 'none';
    $hint.style.display = 'none';
    // Show flash element
    $zoomFlash.style.display = 'block';
  }

  function completeTransition(){
    // Redirect to the actual gallery page
    window.location.href = 'portfolio/';
  }

  /* ═══════════════════════════════════════════════
     GUIDED TOUR NAVIGATION
     ═══════════════════════════════════════════════ */
  // Advance to next painting — the ONLY way to navigate
  function advanceToNext(){
    if(isMoving) return;
    if(viewState === 'viewing'){
      // Currently viewing a painting — turn back, then walk to next
      viewState = 'departing';
      $overlay.style.display = 'none';
      return;
    }
    if(viewState !== 'idle') return;
    var nextIdx = currentStop + 1;
    if(nextIdx >= frameStops.length) return; // end of gallery
    currentStop = nextIdx;
    isMoving = true;
    viewState = 'walking';
    $char.classList.add('walking');
    // Reset idle hint
    idleHintShown = false;
    $hint.style.opacity = '0';
    lastActionTime = performance.now();
    // Hide scroll prompt while walking
    if($scrollPrompt.style.display !== 'none'){
      $scrollPrompt.classList.add('fade-out');
      setTimeout(function(){ $scrollPrompt.style.display='none'; $scrollPrompt.classList.remove('fade-out'); }, 600);
    }
  }

  /* ═══════════════════════════════════════════════
     CONTROLS
     ═══════════════════════════════════════════════ */
  var scrollCooldown = false;
  function handleInput(){
    if(phase !== 'gallery' || scrollCooldown) return;
    scrollCooldown = true;
    setTimeout(function(){ scrollCooldown = false; }, 600);
    advanceToNext();
  }

  // Mouse move for head look
  window.addEventListener('mousemove', function(e){
    mouseX = (e.clientX / innerWidth) * 2 - 1;
    mouseY = (e.clientY / innerHeight) * 2 - 1;
  });

  // Wheel — any scroll direction advances
  window.addEventListener('wheel', function(e){
    if(phase !== 'gallery') return;
    e.preventDefault();
    handleInput();
  }, {passive:false});

  // Touch swipe — any swipe advances
  var touchStartY = null;
  $gal.addEventListener('touchstart', function(e){
    if(e.touches.length === 1) touchStartY = e.touches[0].clientY;
  }, {passive:true});
  $gal.addEventListener('touchmove', function(e){
    if(touchStartY === null || e.touches.length !== 1) return;
    var dy = touchStartY - e.touches[0].clientY;
    if(Math.abs(dy) > 30){
      handleInput();
      touchStartY = null;
    }
  }, {passive:true});
  $gal.addEventListener('touchend', function(){ touchStartY = null; });

  // Tap / click — also advances
  var tapPos = null;
  $gal.addEventListener('mousedown', function(e){ tapPos = {x:e.clientX, y:e.clientY}; });
  window.addEventListener('mouseup', function(e){
    if(tapPos && Math.abs(e.clientX-tapPos.x)<8 && Math.abs(e.clientY-tapPos.y)<8){
      handleInput();
    }
    tapPos = null;
  });
  $gal.addEventListener('touchstart', function(e){
    if(e.touches.length===1) tapPos={x:e.touches[0].clientX, y:e.touches[0].clientY};
  });
  $gal.addEventListener('touchend', function(e){
    if(tapPos && e.changedTouches.length===1){
      var t=e.changedTouches[0];
      if(Math.abs(t.clientX-tapPos.x)<12 && Math.abs(t.clientY-tapPos.y)<12){
        handleInput();
      }
    }
    tapPos = null;
  });

  // Keyboard — space, enter, arrow, any key advances
  window.addEventListener('keydown', function(e){
    if(e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowRight'){
      e.preventDefault();
      handleInput();
    }
  });

  /* ═══════════════════════════════════════════════
     INTRO → GALLERY TRANSITION
     ═══════════════════════════════════════════════ */
  function startGallery(){
    phase='gallery';
    // If called from skip button, fade intro out first
    if(!introEnding){
      $gc.style.transition='opacity 1.2s';
      $gc.style.opacity='0';
      $intro.style.transition='opacity 1.2s';
      $intro.style.opacity='0';
    }
    $skip.style.display='none';

    $gal.style.display='block';
    $gal.style.opacity='0';
    $gal.style.transition='opacity 1.5s';

    setTimeout(function(){
      $gal.style.opacity='1';
      $char.style.display='block';
      $char.classList.add('dropping');
      // Show scroll prompt after drop lands
      setTimeout(function(){
        $char.classList.remove('dropping');
        lastActionTime = performance.now();
        viewState = 'idle';
        // Show the scroll prompt immediately for first painting
        $scrollPrompt.style.display = 'flex';
        $scrollPrompt.style.opacity = '1';
        idleHintShown = true;
      }, 650);
    }, 600);

    setTimeout(function(){
      $gc.style.display='none';
      $intro.style.display='none';
      // Clean up intro resources
      gGeo.dispose(); gMat.dispose(); gR.dispose();
    }, 2000);
  }

  $skip.addEventListener('click', startGallery);

  /* ═══════════════════════════════════════════════
     MENU TOGGLE
     ═══════════════════════════════════════════════ */
  $ham.addEventListener('click', function(){
    $ham.classList.toggle('open');
    $nav.classList.toggle('open');
  });

  /* ═══════════════════════════════════════════════
     RESIZE
     ═══════════════════════════════════════════════ */
  window.addEventListener('resize', function(){
    var w=innerWidth, h=innerHeight;
    if(phase==='intro'){
      gR.setSize(w,h);
      gCam.aspect=w/h; gCam.updateProjectionMatrix();
    }
    rend.setSize(w,h);
    cam.aspect=w/h; cam.updateProjectionMatrix();
  });

  /* ═══════════════════════════════════════════════
     ANIMATION LOOP
     ═══════════════════════════════════════════════ */
  // Camera defaults for gallery walk
  var defaultCamY = 1.6;
  var defaultLookAhead = -20;

  function animate(){
    requestAnimationFrame(animate);
    var now = performance.now();

    if(phase==='intro'){
      var elapsed = now - introStart;
      var t = Math.min(elapsed / INTRO_MS, 1.0);

      var travelZ = 30 * t * t + 2500 * Math.pow(t, 5);
      gCam.position.set(0, 0, -travelZ);
      gCam.lookAt(0, 0, gCam.position.z - 100);

      var speed = 60 * t + 12500 * Math.pow(t, 4);
      var nSpeed = Math.min(speed / 12560, 1.0);
      gMat.uniforms.uSpeed.value = nSpeed;

      gCam.fov = 75 + nSpeed * 35;
      gCam.updateProjectionMatrix();

      var cz = gCam.position.z;
      var posArr = gGeo.attributes.position.array;
      for(var wi = 0; wi < PC; wi++){
        if(posArr[wi*3+2] > cz + 50){
          posArr[wi*3+2] = cz - 50 - Math.random() * (FIELD_LEN - 100);
          posArr[wi*3]   = (Math.random() - 0.5) * FIELD_RAD * 2;
          posArr[wi*3+1] = (Math.random() - 0.5) * FIELD_RAD * 2;
        }
      }
      gGeo.attributes.position.needsUpdate = true;

      if(t > 0.06) $title.style.opacity = '1';
      if(t > 0.14) $sub.style.opacity = '1';
      if(t > 0.45){
        $title.classList.add('intro-fadeout');
        $sub.classList.add('intro-fadeout');
      }

      if(t >= 1.0 && !introEnding){
        introEnding = true;
        // Smoothly fade out the intro canvas before switching
        $gc.style.transition='opacity 1.2s';
        $gc.style.opacity='0';
        $intro.style.transition='opacity 1.2s';
        $intro.style.opacity='0';
        setTimeout(function(){ startGallery(); }, 1200);
      }

      gR.render(gScene, gCam);
    }

    if(phase==='gallery'){
      // Capture floor reflections once
      if(floorNeedsEnv){
        floor.visible = false;
        cubeCam.position.set(0, 0.05, camZ - 5);
        cubeCam.update(rend, scene);
        floor.visible = true;
        floorNeedsEnv = false;
      }

      // --- IDLE / VIEWING HINT TIMER ---
      if((viewState === 'idle' || viewState === 'viewing') && !idleHintShown){
        var waitTime = (currentStop < 2) ? 1500 : 2500;
        if(now - lastActionTime > waitTime){
          // For the first 2 paintings, use the big scroll prompt
          if(currentStop < 2){
            $scrollPrompt.style.display = 'flex';
            $scrollPrompt.style.opacity = '1';
          } else {
            $hint.style.display = 'block';
            $hint.style.transition = 'opacity 0.8s';
            $hint.style.opacity = '1';
          }
          idleHintShown = true;
        }
      }

      // --- WALKING to next painting ---
      if(viewState === 'walking' && isMoving && currentStop >= 0){
        var targetZ = frameStops[currentStop];
        var diff = targetZ - camZ;
        if(Math.abs(diff) < 0.08){
          camZ = targetZ;
          isMoving = false;
          $char.classList.remove('walking');
          // Arrived at painting — start turning to face it
          viewState = 'arriving';
          var side = frameSides[currentStop];
          var fd = frameData[currentStop];
          lookTarget = {
            x: side === 'left' ? -halfW + 0.06 : halfW - 0.06,
            y: FY,
            z: fd.fz,
            side: side,
            index: currentStop
          };
          lookLerp = 0;
          // Hide character so it doesn't block the painting
          $char.style.transition = 'opacity 0.4s';
          $char.style.opacity = '0';
        } else {
          camZ += diff * 0.07;
        }
      }

      // --- ARRIVING (camera turns to face painting) ---
      if(viewState === 'arriving' && lookTarget){
        lookLerp = Math.min(lookLerp + 0.025, 1.0);
        var el = lookLerp * lookLerp * (3 - 2 * lookLerp); // smoothstep

        var lookX = lookTarget.side === 'left' ? -halfW + 0.5 : halfW - 0.5;
        var aheadZ = camZ - 5;
        var blendX = el * lookX;
        var blendZ = lookTarget.z * el + aheadZ * (1 - el);
        var blendY = FY * el + defaultCamY * (1 - el);
        cam.lookAt(blendX, blendY, blendZ);

        if(lookLerp >= 1.0){
          viewState = 'viewing';
          // Show painting info
          $pTitle.textContent = lookTarget.side === 'left' ? frameData[currentStop].title : frameData[currentStop].title;
          $pTitle.textContent = frameData[currentStop].title;
          $pYear.textContent = frameData[currentStop].year;
          $overlay.style.display = 'flex';
          lastActionTime = now;
          idleHintShown = false;
        }
      }

      // --- VIEWING (looking at painting, waiting for scroll/tap to continue) ---
      if(viewState === 'viewing' && lookTarget){
        var vLookX = lookTarget.side === 'left' ? -halfW + 0.5 : halfW - 0.5;
        cam.lookAt(vLookX, FY, lookTarget.z);
      }

      // --- DEPARTING (turning back to hallway before walking to next) ---
      if(viewState === 'departing' && lookTarget){
        lookLerp = Math.max(lookLerp - 0.04, 0);
        var ed = lookLerp * lookLerp * (3 - 2 * lookLerp);
        var depX = lookTarget.side === 'left' ? -halfW + 0.5 : halfW - 0.5;
        var blendDX = ed * depX;
        var blendDY = FY * ed + defaultCamY * (1 - ed);
        cam.lookAt(blendDX, blendDY, camZ - 8);
        if(lookLerp <= 0){
          lookTarget = null;
          // Bring character back
          $char.style.opacity = '0.7';

          // After painting 2 (index 1), transition to flat gallery
          if(currentStop >= 1){
            startZoomTransition();
          } else {
            // Continue to next painting
            var nextIdx = currentStop + 1;
            if(nextIdx < frameStops.length){
              currentStop = nextIdx;
              isMoving = true;
              viewState = 'walking';
              $char.classList.add('walking');
              lastActionTime = now;
            } else {
              viewState = 'idle';
              lastActionTime = now;
            }
          }
        }
      }

      // --- ZOOM RUSH (camera rockets forward, screen whites out) ---
      if(viewState === 'zoom-rush'){
        var zt = (now - zoomRushStart) / ZOOM_RUSH_MS;
        if(zt >= 1.0){
          completeTransition();
        } else {
          // Accelerating rush forward
          var rushEase = zt * zt * zt; // cubic ease-in
          var rushDist = rushEase * 200;
          cam.position.z = camZ - rushDist;
          cam.position.x = 0;
          cam.position.y = defaultCamY;
          cam.lookAt(0, defaultCamY, cam.position.z - 50);
          // Widen FOV for speed feel
          cam.fov = 55 + rushEase * 60;
          cam.updateProjectionMatrix();
          // Flash to white in the last 40%
          if(zt > 0.6){
            var flashT = (zt - 0.6) / 0.4;
            $zoomFlash.style.opacity = flashT.toString();
          }
        }
      }

      // --- IDLE (entrance or between states) ---
      if(viewState === 'idle'){
        cam.position.x = 0;
        cam.position.y = defaultCamY;
        // Subtle head look based on mouse position
        var headX = mouseX * 1.5;
        var headY = defaultCamY - mouseY * 0.4;
        cam.lookAt(headX, headY, camZ - 20);
        cam.fov = 55;
        cam.updateProjectionMatrix();
      }

      // --- WALKING head look (slight while moving) ---
      if(viewState === 'walking'){
        cam.position.x = 0;
        cam.position.y = defaultCamY;
        var wHeadX = mouseX * 0.8;
        var wHeadY = defaultCamY - mouseY * 0.2;
        cam.lookAt(wHeadX, wHeadY, camZ - 15);
        cam.fov = 55;
        cam.updateProjectionMatrix();
      }

      if(viewState !== 'zoom-rush'){
        cam.position.z = camZ;
      }
      camLight.position.set(0, 3, camZ);

      rend.render(scene, cam);
    }
  }

  animate();

  })();
  </script>
</body>
</html>
