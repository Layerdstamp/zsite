<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020000">
  <title>Contact | Zoe Lane Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="art-styles.css">
</head>
<body>
  <nav class="page-nav">
    <a class="nav-brand" href="../index.html">Zoe Lane</a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="portfolio/">Gallery</a>
      <a href="about.html">About</a>
      <a href="cv.html">CV</a>
      <a class="active" href="contact.html">Contact</a>
    </div>
  </nav>

  <main class="main">
    <section class="contact-section">
      <h1>Get in Touch</h1>
      <a class="contact-email" href="mailto:zoe.laneeee@gmail.com">zoe.laneeee@gmail.com</a>

      <form class="contact-form" onsubmit="return false;">
        <div class="form-group">
          <label class="required" for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label class="required" for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone">
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address" name="address">
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <button class="form-submit" type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span class="footer-name">Zoe Lane</span>
      <span>&copy;2026 by zoelaneart.</span>
    </div>
  </footer>
</body>
</html>
